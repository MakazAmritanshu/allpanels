name: Deploy

on:
push:
branches:
- main
- feature-*
- develop

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy Admin (Dashboard)
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_IP }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        set -e
        export PATH="/www/server/nvm/versions/node/v24.13.0/bin:$PATH"

        BRANCH=${{ github.ref_name }}

        echo "Deploying branch: $BRANCH"

        cd /www/wwwroot/allpaneladmin

        git fetch origin
        git checkout $BRANCH || git checkout -b $BRANCH origin/$BRANCH
        git reset --hard origin/$BRANCH

        cd dashboard
        echo "VITE_IS_LOCAL=false" > .env
        npm install --legacy-peer-deps
        npm run build

        cd ../backend
        npm install --legacy-peer-deps
        pm2 restart allpaneladmin || pm2 start server.js --name allpaneladmin


  - name: Deploy Client
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_IP }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SSH_PRIVATE_KEY }}
      script: |
        set -e
        export PATH="/www/server/nvm/versions/node/v24.13.0/bin:$PATH"

        BRANCH=${{ github.ref_name }}

        echo "Deploying branch: $BRANCH"

        cd /www/wwwroot/allpanel

        git fetch origin
        git checkout $BRANCH || git checkout -b $BRANCH origin/$BRANCH
        git reset --hard origin/$BRANCH

        cd client
        echo "VITE_IS_LOCAL=false" > .env
        npm install --legacy-peer-deps
        npm run build

        cd ../backend
        npm install --legacy-peer-deps
        pm2 restart allpanel || pm2 start server.js --name allpanel


  - name: Notify Success
    if: success()
    run: |
      curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
        -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
        -d text="✅ Deployment successful
      Branch: ${{ github.ref_name }}
      Commit: ${{ github.sha }}
      By: ${{ github.actor }}"


  - name: Notify Failure
    if: failure()
    run: |
      curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
        -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
        -d text="❌ Deployment FAILED
      Branch: ${{ github.ref_name }}
      Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
```
